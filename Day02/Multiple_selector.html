<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      p,
      h1 {
        background-color: rgb(11, 57, 106);
        color: rgb(164, 211, 236);
      }
      div p, div h1 {
        background-color: rgb(164, 211, 236);
        color: rgb(11, 57, 106);
      }
    </style>
  </head>
  <body>
    <hr>
    <h1>Hello!</h1>
    <hr>
    <p>Welcome!</p>
    <hr>
    <div>
        <h1>Hi!</h1>
            <p>Welcome to the div!</p>
    </div>
    <hr>
  </body>
</html>
