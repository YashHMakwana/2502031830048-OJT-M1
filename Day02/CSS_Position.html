<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(98, 69, 89);
        }
        h1{
            color: white;
            position: absolute;
            top: 0;
            height: 50px;
            width: 150px;  
            bottom: 10px; 
            background-color: rgb(150, 255, 237);         
        }
        h2{
            color: rgb(255, 255, 255);
            position: relative;
            top: 0;
            right: -200px;
            background-color: rgb(32, 50, 47);
            height: 50px;
            width: 150px;
        }
        h3{
            color: rgb(255, 255, 255);
            position: fixed;
            top: 100px;
            background-color: rgb(143, 0, 0);
            height: 50px;
            width: 150px;
        }
       
    </style>
</head>
<body>
    <h1>Absolute</h1>
    <h2>Relative</h2>
    <h3>Fixed</h3>
</body>
</html>
