<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" align="center">
    <h2>Registration Form</h2>
    <table border="4" align="center">
        <tr>
            <td align="center">First Name</td>
            <td><input type="text" id="Fname" name="Fname" placeholder="Enter First Name"></td>
        </tr>
        <tr>
            <td align="center">Last Name</td>
            <td><input type="text" id="Lname" name="Lname" placeholder="Enter Last Name"></td>
        </tr>
        <tr>
            <td align="center">Email</td>
            <td><input type="email" id="email" name="email" placeholder="Enter Email"></td>
        </tr>
        <tr>
            <td align="center">Password</td>
            <td><input type="password" id="password" name="password" placeholder="Enter Password"></td>
        </tr>
        <tr>
            <td align="center">Birth Date</td>
            <td><input type="date" id="birthdate" name="birthdate" placeholder="Enter Birth Date"></td>
        </tr>
        <tr>
            <td align="center">Age</td>
            <td><input type="number" id="age" name="age" placeholder="Enter Age"></td>
        </tr>
        <tr>
            <td align="center">Gender</td>
            <td>
                <input type="radio" id="male" name="gender" value="male">   
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">   
                <label for="female">Female</label>
            </td>
        </tr>
        <tr>
            <td align="center">Address</td>
            <td><textarea name="Enter Address" id="address" placeholder="Enter Address"></textarea></td>
        </tr>
        <tr>
            <td align="center">City</td>
            <td><input type="text" id="city" name="city" placeholder="Enter City"></td>
        </tr>
        <tr>
            <td align="center">Zip Code</td>
            <td><input type="text" id="zipcode" name="zipcode" placeholder="Enter Zip Code"></td>
        </tr>
        <tr>
            <td align="center">Join Date</td>
            <td><input type="date" id="joindate" name="joindate" placeholder="Enter Join Date"></td>
        </tr>
        <tr>
            <td align="center">Confirm Your Form</td>
            <td><button>Confirm</button><input type="reset" value="Reset"></td>
        </tr>
    </table>
    </form>
</body>
</html>
